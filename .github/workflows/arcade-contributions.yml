name: Arcade Contributions

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * *"
  push:
    branches:
      - main
      - master
    paths:
      - "scripts/generate_arcade_contrib.py"
      - ".github/workflows/arcade-contributions.yml"
      - "README.md"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate arcade contribution SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USERNAME: Aleksandros2
        run: python scripts/generate_arcade_contrib.py

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain assets/arcade-contrib.svg)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/arcade-contrib.svg
            git commit -m "chore: update arcade contribution animation"
            git push
          else
            echo "No changes to commit."
          fi
